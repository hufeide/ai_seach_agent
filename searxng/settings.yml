use_default_settings: true

search:
  formats:
    - html
    - json

server:
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  secret_key: "change-this-secret-key"

outgoing:
  request_timeout: 10.0
  proxies:
    all://:
      - socks5h://192.168.1.159:10808

engines:
  - name: radio browser
    disabled: true

  - name: ahmia
    disabled: true

  - name: torch
    disabled: true

  - name: duckduckgo
    disabled: true